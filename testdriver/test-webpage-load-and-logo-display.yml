version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Navigate to example.com.
    commands: []
  - prompt: Assert that the webpage loads successfully.
    commands:
      - command: assert
        expect: Example Domain is visible on the page
  - prompt: >-
      Assert that the logo is displayed on the webpage.  # Use the content of
      the file from the environment
    commands:
      - command: assert
        expect: the logo is visible on the page
