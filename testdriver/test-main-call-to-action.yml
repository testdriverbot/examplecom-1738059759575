version: 4.1.43
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Navigate to example.com.
    commands: []
  - prompt: Click on the main call to action on the page.
    commands:
      - command: hover-text
        text: More information...
        description: link to more information on the example.com page
        action: click
  - prompt: >-
      Assert that the action leads to the expected outcome without errors.  #
      Use the content of the file from the environment
    commands:
      - command: assert
        expect: Example Domains is visible on the page
